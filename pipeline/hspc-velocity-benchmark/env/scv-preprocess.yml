# 공통 전처리 env (P1 unified preprocessing) — 어떤 velocity method에도 안 묶임.
# raw 2 sample(MV-1/MV-2) → QC → normalization → HVG → peak-gene → 통합 MuData/AnnData.
name: scv-preprocess
channels: [conda-forge, bioconda]
dependencies:
  - python=3.11
  - numpy<2            # multivelo 0.1.5/torch ABI: numpy 2.x면 torch import 경고 + 불안정
  - pandas
  - scipy<1.14         # multivelo 0.1.5가 sparse .A 사용 → scipy 1.14+에서 제거됨(AttributeError)
  - scikit-learn
  - h5py
  - scanpy
  - anndata
  - leidenalg          # method-agnostic Leiden annotation (DESIGN §3)
  - python-igraph
  - cython             # scrublet 런타임 의존 (없으면 pip resolver 경고)
  - scrublet           # doublet 제거 (검토자 지적 confound)
  - pip
  - pip:
      - scvelo          # loom spliced/unspliced 병합 + velocity 전처리 유틸
      - torch           # multivelo 런타임 의존 (CPU wheel) — 없으면 aggregate_peaks_10x 실패
      - multivelo       # P1 ATAC peak→gene 집계(aggregate_peaks_10x)
      - mudata
      - muon
      # snapatac2 제외: 2.9.0이 numpy>=2 / scipy>=2 강제 → multivelo 0.1.5(numpy<2,scipy<1.14)와
      #   충돌해 env 재생성 시 핀이 깨진다. P1은 snapatac2 미사용. 필요하면 별도 env에서.
      # 재확인용 재-핀 (pip resolver가 위 패키지 설치 중 올려놓는 것 방지):
      - "numpy<2"
      - "scipy<1.14"
      # ambient: cellbender 또는 soupx(R) 는 별도 — README 참고

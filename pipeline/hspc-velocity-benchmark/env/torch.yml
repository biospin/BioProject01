# PyTorch 계열: MultiVeloVAE + MoFlow. (TensorFlow 계열과 절대 한 env에 두지 말 것.)
# CPU 기본. GPU는 README의 CUDA 빌드 노트 참고 (1 GPU면 충분).
name: torch
channels: [conda-forge]
dependencies:
  - python=3.10
  - numpy<2
  - pandas
  - scipy
  - scanpy
  - anndata
  - pip
  - pip:
      - torch                 # CPU wheel. GPU: README 참고 (--index-url cu12x)
      - pytorch-lightning     # MoFlow harness
      # 아래는 github 설치 — import 이름·설치 성공 여부 검토필요(검토필요:)
      - "git+https://github.com/welch-lab/MultiVeloVAE.git"   # BSD-3
      - "git+https://github.com/AriHong/MoFlow.git"           # MIT

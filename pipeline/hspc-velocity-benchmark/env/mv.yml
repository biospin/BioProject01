# MultiVelo(baseline) + scVelo(RNA-only floor). numba 기반, GPU 불요.
name: mv
channels: [conda-forge, bioconda]
dependencies:
  - python=3.10
  - numpy<2
  - pandas
  - scipy
  - numba
  - scanpy
  - anndata
  - pip
  - pip:
      - scvelo          # RNA-only baseline (chromatin 기여 대조 floor)
      - multivelo       # welch-lab; chromatin-aware ODE baseline

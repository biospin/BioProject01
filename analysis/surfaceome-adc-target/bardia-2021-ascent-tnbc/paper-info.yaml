abstract_text: >
  Patients with metastatic triple-negative breast cancer have a poor prognosis.
  Sacituzumab govitecan is an antibody-drug conjugate targeting TROP-2, coupled
  to SN-38 through a hydrolyzable linker. In this randomized, phase 3 trial
  (ASCENT), SG was compared with single-agent chemotherapy (eribulin, vinorelbine,
  capecitabine, or gemcitabine) in relapsed/refractory mTNBC. Median PFS was 5.6 mo
  (SG) vs. 1.7 mo (chemo), HR 0.41, P<0.001. Median OS 12.1 vs. 6.7 mo, HR 0.48,
  P<0.001. ORR 35% vs. 5%.

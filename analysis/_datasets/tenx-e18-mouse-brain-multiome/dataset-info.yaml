# 10x Genomics — Fresh Embryonic E18 Mouse Brain (5k) — Single Cell Multiome ATAC + Gene Expression
# 본 프로젝트 Dataset 1. 동반 paper 없음 (vendor demo dataset).

# Identity
dataset_id: "tenx-e18-mouse-brain-multiome"
provider: "10x Genomics"
version: "1.0.0"            # MultiVelo가 사용한 첫 release. 후속 2.0.0 / Cell Ranger ARC 2.0 reprocessing 있음.
release_date: "미제공: 10x dataset page에 명시 안 됨. 추정 2020년 10x Multiome 제품 launch 시점."

# Biological identity
species: "Mus musculus"
tissue: "Embryonic day 18 (E18) cerebral cortex; 후속 release version (3.1 standard 6.0.0)은 cortex + hippocampus + subventricular zone (SVZ) nuclei combined로 명시"
sample_provenance: "10x Genomics가 BrainBits LLC (commercial supplier)로부터 commission한 C57BL/6 strain mouse tissue. donor 수·연령 등 추가 정보 미제공."
modality:
  - "scRNA-seq (Gene Expression library)"
  - "scATAC-seq (ATAC library)"
  - "paired Multiome (same nucleus joint profiling)"
platform: "10x Genomics Chromium Next GEM Single Cell Multiome ATAC + Gene Expression"

# Scale
cell_count_advertised: 5000          # "5k" 명목
cell_count_after_qc: 3365            # MultiVelo (Li 2023) Dataset 1 reported value after filtering
gene_count_advertised: "미제공"
gene_count_after_filtering: 936      # MultiVelo Dataset 1, highly variable genes after filtering

# Access
access:
  primary_url: "https://www.10xgenomics.com/datasets/fresh-embryonic-e-18-mouse-brain-5-k-1-standard-1-0-0"
  primary_url_alt:
    - "https://www.10xgenomics.com/datasets/fresh-embryonic-e-18-mouse-brain-5-k-1-standard-2-0-0"
    - "https://www.10xgenomics.com/datasets/5-k-mouse-e-18-combined-cortex-hippocampus-and-subventricular-zone-nuclei-3-1-standard-6-0-0"
  geo_accession: null              # 10x demo dataset은 GEO에 deposit되지 않음
  sra_accession: null
  license: "CC BY 4.0"
  citation_form: "10x Genomics. Fresh Embryonic E18 Mouse Brain (5k), Single Cell Multiome ATAC + Gene Expression Dataset by Cell Ranger ARC v1.0.0. https://www.10xgenomics.com/datasets/fresh-embryonic-e-18-mouse-brain-5-k-1-standard-1-0-0"


# Secondary references (이 dataset을 분석한 paper들 — de facto representative analyses)
secondary_refs:
  - paper_id: "li-2023-multivelo"
    paper_local: "analysis/epigenomic-lag/li-2023-multivelo"
    relation: "first-refereed-analysis"
    role_in_paper: "Dataset 1 — MultiVelo의 기본 동작 검증용 (RG → IPC → ExN trajectory 회복, M1/M2 gene 분류 정량)"
    key_numbers:
      - "3,365 cells × 936 highly variable genes"
      - "426 genes high-likelihood ODE fit (likelihood > 0.05)"
      - "induction-only 29.5%, repression-only 2.4%, M1 41.4%, M2 26.7%"
      - "M2 highest spliced expression timing earlier than M1: P = 9e-7 (Wilcoxon one-sided)"
      - "primed 21%, decoupled 19% of total time (median)"
    note: "MultiVelo가 이 dataset에 대해 reported한 cell/gene 수 + 분포가 본 프로젝트 Dataset 1 agent의 *재현 target*."
  - paper_id: "li-2025-multivelovae"
    paper_local: "analysis/epigenomic-lag/li-2025-multivelovae"
    relation: "benchmark-reuse"
    role_in_paper: "Mouse brain 10x Multiome dataset 재사용 (`@li2023multivelo` AnnData 그대로 사용)"
    note: "Dataset 1을 li-2023-multivelo가 제공한 preprocessed AnnData 형태로 직접 가져옴. 즉 Dataset 1의 표준 preprocessing은 MultiVelo 저자 release."
  # 다른 chromatin-RNA velocity paper들 (cui-2024-deepvelo, hong-2026-moflow 등)이 이 dataset을 쓰는지는 각 paper 분석본 확인 후 추가.

# Role in this project (agent operation)
project_role:
  dataset_number: 1
  agent_owner:
    primary: "이건규"                  # 2026-05-26 update — 이전 표기: gglee / gklee / Geongyu
    secondary: []
    note: "본 dataset의 agent operation은 이건규 담당. 한국명 표준화 (이전 CLAUDE.md: gglee)."
  primary_use: "Smoke test + 문헌 비교 anchor. 가장 작고 가장 많이 benchmark된 dataset이므로 pipeline 변경 시 회귀 감지가 빠르다."
  expected_outputs:
    - "RG → IPC → ExN → upper/deeper layer trajectory 복원 (정성)"
    - "M1 vs M2 gene 분류 비율 재현 (MultiVelo Fig. 2h 수치와 ±α% 이내)"
    - "decoupled state interval ≈ 19% of total latent time (median)"
    - "(향후) baseline epigenomic feature → activation/shutdown lag 추정의 sanity check"
  cross_ref_with_other_datasets:
    - "Dataset 2 (SHARE-seq mouse skin): 같은 mouse지만 platform / tissue 다름 → platform-invariant lag 신호 검증"
    - "Dataset 3 (Trevino 2021 human cortex): 같은 cortex developmental 맥락 / species 다름 → species-conserved program 검증"


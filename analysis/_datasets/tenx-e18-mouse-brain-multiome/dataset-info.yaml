  - title: "User Guide — Chromium Next GEM Single Cell Multiome ATAC + Gene Expression"
    code: "CG000338 Rev A"
    url: "https://www.10xgenomics.com/support/single-cell-multiome-atac-plus-gene-expression/documentation/chromium-next-gem-single-cell-multiome-atac-plus-gene-expression-reagent-kits-user-guide"
